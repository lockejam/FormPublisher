name: Build

on:
  push:
    branches:
      - main
      - m3-packaging-readiness
  pull_request:
    branches:
      - main
      - m3-packaging-readiness
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  build:
    name: Build, test, pack, and smoke test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore PdfFormPublisher.slnx

      - name: Build
        run: dotnet build PdfFormPublisher.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test PdfFormPublisher.slnx --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/PdfFormPublisher/PdfFormPublisher.csproj --configuration Release --no-build --output artifacts/packages

      - name: Package smoke test
        shell: pwsh
        run: ./scripts/package-smoke-test.ps1 -SkipSolutionBuild -SkipPack

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pdf-form-publisher-packages
          path: artifacts/packages/*
          if-no-files-found: error
